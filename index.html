<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>75 Hard — Diet Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #141210;
    --bg2: #1c1915;
    --bg3: #242018;
    --card: #1f1c18;
    --card2: #272320;
    --terra: #d4623a;
    --terra-light: #e07a55;
    --terra-dark: #a84a28;
    --cream: #f0e6d3;
    --cream-dim: #c8b89a;
    --olive: #7a8c4e;
    --olive-light: #9aae62;
    --gold: #c9a84c;
    --gold-light: #dfc06a;
    --blue-soft: #4a7c8c;
    --text: #ede3d4;
    --text-dim: #8a7d6e;
    --text-muted: #5a4e42;
    --border: rgba(255,255,255,0.06);
    --border-warm: rgba(212,98,58,0.2);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRAIN OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 80px 24px 60px;
    position: relative;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 50%, rgba(212,98,58,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 30%, rgba(122,140,78,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 100%, rgba(201,168,76,0.06) 0%, transparent 50%);
  }

  .hero-lines {
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 80px,
        rgba(255,255,255,0.015) 80px,
        rgba(255,255,255,0.015) 81px
      );
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(212,98,58,0.15);
    border: 1px solid rgba(212,98,58,0.3);
    color: var(--terra-light);
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 100px;
    margin-bottom: 36px;
    position: relative;
    animation: fadeUp 0.8s ease both;
  }

  .hero-badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--terra);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .hero-number {
    font-family: 'Playfair Display', serif;
    font-size: clamp(100px, 25vw, 200px);
    font-weight: 900;
    line-height: 0.85;
    color: transparent;
    -webkit-text-stroke: 1px rgba(240,230,211,0.15);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    white-space: nowrap;
    pointer-events: none;
    letter-spacing: -0.02em;
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(52px, 10vw, 100px);
    font-weight: 900;
    line-height: 0.9;
    letter-spacing: -0.02em;
    position: relative;
    animation: fadeUp 0.8s 0.1s ease both;
  }

  .hero-title .accent { color: var(--terra); font-style: italic; }

  .hero-subtitle {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--cream-dim);
    margin-top: 20px;
    position: relative;
    animation: fadeUp 0.8s 0.2s ease both;
  }

  .hero-divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--terra), transparent);
    margin: 28px auto;
    animation: fadeUp 0.8s 0.3s ease both;
    position: relative;
  }

  .hero-tagline {
    font-size: 15px;
    color: var(--text-dim);
    max-width: 400px;
    animation: fadeUp 0.8s 0.4s ease both;
    position: relative;
    line-height: 1.7;
  }

  .hero-stats {
    display: flex;
    gap: 12px;
    margin-top: 48px;
    position: relative;
    animation: fadeUp 0.8s 0.5s ease both;
    flex-wrap: wrap;
    justify-content: center;
  }

  .hero-stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 28px;
    text-align: left;
    min-width: 140px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.3s;
  }

  .hero-stat:hover {
    border-color: var(--border-warm);
    transform: translateY(-2px);
  }

  .hero-stat::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--terra), transparent);
  }

  .stat-label {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--cream);
    line-height: 1;
  }

  .stat-unit {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* COUNTER DASHBOARD */
  .counter-wrap {
    position: relative;
    margin-top: 48px;
    animation: fadeUp 0.8s 0.6s ease both;
    width: 100%;
    max-width: 680px;
  }

  .counter-card {
    background: rgba(31,28,24,0.85);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 28px;
    padding: 28px 32px;
    backdrop-filter: blur(12px);
    position: relative;
    overflow: hidden;
  }

  .counter-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 60% at 0% 50%, rgba(212,98,58,0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Top row: ring + meta */
  .counter-top {
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .counter-ring-wrap {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .counter-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    transition: transform 0.15s;
    position: relative;
  }

  .counter-btn:hover { transform: scale(1.03); }
  .counter-btn:active { transform: scale(0.96); }

  .counter-ring {
    width: 130px;
    height: 130px;
    position: relative;
  }

  .counter-ring svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .counter-ring-bg {
    fill: none;
    stroke: rgba(255,255,255,0.06);
    stroke-width: 4;
  }

  .counter-ring-fill {
    fill: none;
    stroke: var(--terra);
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.4s;
  }

  .counter-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  .counter-label-top {
    font-family: 'Syne', sans-serif;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    line-height: 1;
    margin-bottom: 6px;
  }

  .counter-number {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--cream);
    line-height: 1;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    margin-bottom: 10px;
  }

  .counter-number.pop {
    transform: scale(1.12);
    color: var(--terra-light);
  }

  .counter-label-bottom {
    font-family: 'Syne', sans-serif;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    line-height: 1;
    margin-top: 0;
  }

  .counter-tap-hint {
    font-family: 'Syne', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    transition: color 0.2s;
  }

  .counter-btn:hover .counter-tap-hint { color: var(--terra); }
  .counter-btn.done .counter-ring-fill { stroke: var(--gold); }
  .counter-btn.done .counter-number { color: var(--gold); }

  /* Meta: dates + status */
  .counter-meta {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .counter-status {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--cream);
    line-height: 1.2;
    min-height: 48px;
    display: flex;
    align-items: center;
  }

  .counter-dates {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .counter-date-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
  }

  .cdb-label {
    font-family: 'Syne', sans-serif;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .cdb-value {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--cream-dim);
    letter-spacing: 0.02em;
  }

  .cdb-value.not-started {
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 400;
    font-family: 'DM Sans', sans-serif;
    font-style: italic;
  }

  /* Progress bar */
  .counter-progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 4px;
  }

  .counter-progress-bar {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 100px;
    overflow: hidden;
  }

  .counter-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--terra), var(--gold));
    border-radius: 100px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
  }

  .counter-pct {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: var(--terra);
    white-space: nowrap;
  }

  /* Divider */
  .counter-divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0 16px;
  }

  /* Bottom row: daily checklist + water */
  .counter-bottom {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .daily-section-label {
    font-family: 'Syne', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  /* Daily checklist */
  .daily-checks {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .daily-check-item {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    padding: 6px 8px;
    border-radius: 8px;
    transition: background 0.2s;
  }

  .daily-check-item:hover { background: rgba(255,255,255,0.03); }

  .dci-box {
    width: 18px; height: 18px;
    border: 1.5px solid var(--text-muted);
    border-radius: 5px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .daily-check-item.checked .dci-box {
    background: var(--terra);
    border-color: var(--terra);
  }

  .daily-check-item.checked .dci-box::after {
    content: '';
    width: 9px; height: 6px;
    border-left: 2px solid white;
    border-bottom: 2px solid white;
    transform: rotate(-45deg) translateY(-1px);
    display: block;
  }

  .dci-label {
    font-size: 12px;
    color: var(--text-dim);
    transition: color 0.2s;
  }

  .daily-check-item.checked .dci-label {
    color: var(--text-muted);
    text-decoration: line-through;
  }

  /* Water tracker */
  .water-tracker {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .water-glasses {
    display: flex;
    gap: 5px;
    flex-wrap: nowrap;
    justify-content: center;
  }

  .water-label {
    font-size: 11px;
    color: var(--text-muted);
    transition: color 0.3s;
    margin-top: 10px;
    text-align: center;
  }

  .water-glass:hover { transform: scale(1.1); }

  .water-glass svg {
    width: 100%; height: 100%;
  }

  .water-glass-body {
    fill: rgba(255,255,255,0.06);
    transition: fill 0.3s;
  }

  .water-glass.filled .water-glass-body {
    fill: rgba(74,124,140,0.6);
  }

  .water-glass-outline {
    fill: none;
    stroke: rgba(255,255,255,0.15);
    stroke-width: 1.5;
  }

  .water-glass.filled .water-glass-outline {
    stroke: var(--blue-soft);
  }

  .water-label {
    font-size: 11px;
    color: var(--text-muted);
    transition: color 0.3s;
  }

  .water-label.full { color: var(--blue-soft); }

  /* Person panels */
  .person-panel {
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
  }

  .person-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .person-panel-name {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
  }

  .fran-name { color: var(--terra-light); }
  .maria-name { color: var(--olive-light); }

  .person-panel-tag {
    font-size: 18px;
  }

  /* Override dci-box color per panel */
  .maria-panel .daily-check-item.checked .dci-box {
    background: var(--olive);
    border-color: var(--olive);
  }

  .maria-panel .water-glass.filled .water-glass-body {
    fill: rgba(122,140,78,0.5);
  }

  .maria-panel .water-glass.filled .water-glass-outline {
    stroke: var(--olive-light);
  }

  .maria-panel .water-label.full { color: var(--olive-light); }

  /* Reset — subtle icon in top-right of card */
  .counter-reset-row {
    position: absolute;
    top: 14px;
    right: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .counter-reset {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 16px;
    line-height: 1;
    padding: 4px;
    border-radius: 50%;
    transition: color 0.2s, transform 0.3s;
    display: none;
    opacity: 0.5;
  }

  .counter-reset.visible { display: block; }
  .counter-reset:hover { color: var(--terra); transform: rotate(-180deg); opacity: 1; }

  /* Water glasses — small so all 8 fit in one row */
  .water-glass {
    width: 20px;
    height: 24px;
    cursor: pointer;
    transition: transform 0.15s;
    flex-shrink: 0;
  }

  .scroll-cue {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    animation: fadeUp 1s 1s ease both;
  }

  .scroll-line {
    width: 1px;
    height: 40px;
    background: linear-gradient(180deg, var(--terra), transparent);
    animation: scrollPulse 2s infinite;
  }

  @keyframes scrollPulse {
    0% { opacity: 0; transform: scaleY(0); transform-origin: top; }
    50% { opacity: 1; transform: scaleY(1); }
    100% { opacity: 0; transform: scaleY(0); transform-origin: bottom; }
  }

  /* MAIN LAYOUT */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 120px;
  }

  /* SECTION HEADER */
  .section-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--terra);
    margin-bottom: 8px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 5vw, 48px);
    font-weight: 700;
    line-height: 1;
    color: var(--cream);
  }

  .section-title em { font-style: italic; color: var(--terra); }

  /* PERSON TOGGLE */
  .person-toggle-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 4px;
    display: flex;
    gap: 2px;
    margin-bottom: 48px;
    width: fit-content;
  }

  .person-btn {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 24px;
    border-radius: 100px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.25s;
  }

  .person-btn.active {
    background: var(--terra);
    color: white;
  }

  .person-btn:hover:not(.active) {
    color: var(--text);
    background: rgba(255,255,255,0.05);
  }

  /* PROFILES */
  .profiles-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 60px;
  }

  .profile-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .profile-card:hover { border-color: var(--border-warm); }

  .profile-card.francisco::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(212,98,58,0.12) 0%, transparent 70%);
  }

  .profile-card.maria::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(122,140,78,0.12) 0%, transparent 70%);
  }

  .profile-name {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--cream);
    margin-bottom: 4px;
  }

  .profile-goal {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 24px;
    font-style: italic;
  }

  .profile-macros {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  .macro-item {
    background: var(--bg3);
    border-radius: 12px;
    padding: 14px;
  }

  .macro-name {
    font-family: 'Syne', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .macro-val {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
  }

  .macro-val.kcal { color: var(--terra); }
  .macro-val.protein { color: var(--gold); }
  .macro-val.carbs { color: var(--olive-light); }
  .macro-val.fat { color: var(--blue-soft); }

  .macro-unit {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: var(--text-muted);
  }

  /* DAY NAV */
  .day-nav {
    display: flex;
    gap: 8px;
    margin-bottom: 40px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }

  .day-nav::-webkit-scrollbar { display: none; }

  .day-btn {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 12px 20px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .day-btn.cheat {
    border-color: rgba(201,168,76,0.2);
    color: var(--gold);
  }

  .day-btn.active {
    background: var(--terra);
    border-color: var(--terra);
    color: white;
  }

  .day-btn.cheat.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--bg);
  }

  .day-btn:hover:not(.active) {
    border-color: rgba(212,98,58,0.3);
    color: var(--text);
  }

  /* DAY PANEL */
  .day-panel { display: none; }
  .day-panel.active { display: block; animation: fadeUp 0.4s ease both; }

  .day-title-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
  }

  .day-name {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 900;
    color: var(--cream);
    line-height: 1;
  }

  .day-tag {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 100px;
    background: rgba(212,98,58,0.15);
    color: var(--terra);
    border: 1px solid rgba(212,98,58,0.25);
  }

  /* MEALS GRID */
  .meals-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .meal-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.2s;
    cursor: pointer;
  }

  .meal-card:hover {
    border-color: var(--border-warm);
    transform: translateY(-2px);
  }

  .meal-card.expanded {
    border-color: rgba(212,98,58,0.3);
  }

  .meal-header {
    padding: 22px 24px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .meal-type {
    font-family: 'Syne', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .meal-type.lunch { color: var(--terra); }
  .meal-type.snack-f { color: var(--gold); }
  .meal-type.snack-gf { color: var(--olive-light); }
  .meal-type.dinner { color: var(--blue-soft); }
  .meal-type.free { color: var(--gold); }

  .meal-name {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--cream);
    line-height: 1.2;
  }

  .meal-time {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    white-space: nowrap;
    margin-top: 2px;
  }

  .meal-expand-icon {
    width: 28px;
    height: 28px;
    background: var(--bg3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.3s;
    margin-top: 2px;
  }

  .meal-card.expanded .meal-expand-icon {
    background: var(--terra);
    transform: rotate(45deg);
  }

  .meal-expand-icon svg {
    width: 12px; height: 12px;
    fill: none;
    stroke: var(--text-dim);
    stroke-width: 2;
    transition: stroke 0.2s;
  }

  .meal-card.expanded .meal-expand-icon svg { stroke: white; }

  .meal-body { padding: 0 24px; }

  .portions-table {
    padding: 18px 0;
    border-bottom: 1px solid var(--border);
  }

  .portions-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 8px;
    align-items: center;
    padding: 6px 0;
    font-size: 13px;
  }

  .portions-row:first-child {
    font-family: 'Syne', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .portions-row .ingredient { color: var(--text-dim); }
  .portions-row .fran { color: var(--terra-light); font-weight: 500; text-align: right; font-size: 12px; }
  .portions-row .gf { color: var(--olive-light); font-weight: 500; text-align: right; font-size: 12px; }

  .meal-method {
    padding: 16px 0;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.7;
    border-bottom: 1px solid var(--border);
  }

  .meal-method strong {
    color: var(--cream-dim);
    font-weight: 500;
  }

  .meal-macros {
    padding: 16px 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .macro-block {
    background: var(--bg3);
    border-radius: 10px;
    padding: 12px 14px;
  }

  .macro-block .who {
    font-family: 'Syne', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .macro-block.fran-block .who { color: var(--terra); }
  .macro-block.gf-block .who { color: var(--olive-light); }

  .macro-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .mpill {
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 100px;
    background: rgba(255,255,255,0.05);
    color: var(--text-dim);
  }

  .mpill.kcal { color: var(--terra-light); background: rgba(212,98,58,0.1); }
  .mpill.p { color: var(--gold-light); background: rgba(201,168,76,0.1); }
  .mpill.c { color: var(--olive-light); background: rgba(122,140,78,0.1); }
  .mpill.f { color: #7ab8c8; background: rgba(74,124,140,0.1); }

  .meal-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
  }

  .meal-card.expanded .meal-detail {
    max-height: 800px;
  }

  /* SNACK FULL-WIDTH */
  .snack-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .snack-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px 24px;
    transition: border-color 0.3s;
  }

  .snack-card:hover { border-color: var(--border-warm); }

  .snack-who {
    font-family: 'Syne', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .snack-who.fran { color: var(--terra); }
  .snack-who.gf { color: var(--olive-light); }

  .snack-content {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .snack-macros {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  /* CHEAT DAY */
  .cheat-card {
    background: var(--card);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 24px;
    padding: 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .cheat-card::before {
    content: '🎉';
    position: absolute;
    font-size: 120px;
    top: -20px;
    right: -20px;
    opacity: 0.08;
    line-height: 1;
  }

  .cheat-title {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 900;
    color: var(--gold);
    margin-bottom: 12px;
  }

  .cheat-sub {
    font-size: 14px;
    color: var(--text-dim);
    max-width: 500px;
    margin: 0 auto 28px;
    line-height: 1.7;
  }

  .cheat-rules {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }

  .cheat-rule {
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.2);
    color: var(--gold-light);
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 10px 18px;
    border-radius: 100px;
  }

  /* TIPS SECTION */
  .tips-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-top: 60px;
  }

  .tip-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    transition: border-color 0.3s, transform 0.2s;
  }

  .tip-card:hover {
    border-color: var(--border-warm);
    transform: translateY(-2px);
  }

  .tip-icon {
    font-size: 28px;
    margin-bottom: 14px;
    display: block;
  }

  .tip-title {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--cream-dim);
    margin-bottom: 10px;
  }

  .tip-text {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.7;
  }

  /* SHOPPING LIST */
  .shop-section { margin-top: 80px; }

  .shop-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .shop-category {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
  }

  .shop-cat-title {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--terra);
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .shop-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    cursor: pointer;
    border-radius: 8px;
    transition: background 0.2s;
    padding-left: 4px;
  }

  .shop-item:hover { background: rgba(255,255,255,0.03); }

  .shop-check {
    width: 16px; height: 16px;
    border: 1.5px solid var(--text-muted);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .shop-item.checked .shop-check {
    background: var(--terra);
    border-color: var(--terra);
  }

  .shop-item.checked .shop-check::after {
    content: '';
    width: 8px; height: 5px;
    border-left: 1.5px solid white;
    border-bottom: 1.5px solid white;
    transform: rotate(-45deg) translateY(-1px);
    display: block;
  }

  .shop-item-name {
    font-size: 13px;
    color: var(--text-dim);
    transition: color 0.2s;
  }

  .shop-item.checked .shop-item-name {
    color: var(--text-muted);
    text-decoration: line-through;
  }

  /* PHASE TOGGLE */
  .phase-section {
    margin-top: 80px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 36px;
    position: relative;
    overflow: hidden;
  }

  .phase-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 0% 50%, rgba(212,98,58,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .phase-toggle-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .phase-toggle {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 4px;
    display: flex;
    gap: 2px;
  }

  .phase-btn {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 100px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.25s;
  }

  .phase-btn.active { background: var(--terra); color: white; }

  .phase-content { display: none; }
  .phase-content.active { display: block; animation: fadeUp 0.3s ease both; }

  .phase-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .phase-item {
    background: var(--bg3);
    border-radius: 14px;
    padding: 20px;
  }

  .phase-item-label {
    font-family: 'Syne', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--terra);
    margin-bottom: 8px;
  }

  .phase-item-text {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.7;
  }

  /* FOOTER */
  .footer {
    margin-top: 120px;
    padding: 48px 24px;
    text-align: center;
    border-top: 1px solid var(--border);
  }

  .footer-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--terra);
    font-style: italic;
    margin-bottom: 8px;
  }

  .footer-sub {
    font-size: 13px;
    color: var(--text-muted);
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .reveal {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* MOBILE */
  @media (max-width: 700px) {
    .profiles-grid { grid-template-columns: 1fr; }
    .meals-grid { grid-template-columns: 1fr; }
    .snack-row { grid-template-columns: 1fr; }
    .tips-grid { grid-template-columns: 1fr; }
    .shop-grid { grid-template-columns: 1fr 1fr; }
    .phase-grid { grid-template-columns: 1fr; }
    .hero-title { font-size: 48px; }
    .hero-stats { gap: 10px; }
    .counter-top { flex-direction: column; align-items: center; text-align: center; }
    .counter-meta { width: 100%; }
    .counter-dates { grid-template-columns: 1fr 1fr; }
    .counter-bottom { grid-template-columns: 1fr; gap: 14px; }
    .counter-card { padding: 20px 18px; }
    .counter-wrap { max-width: 100%; padding: 0 8px; }
  }

  @media (max-width: 500px) {
    .shop-grid { grid-template-columns: 1fr; }
    .profile-macros { grid-template-columns: 1fr 1fr; }
    .hero-stats { flex-direction: column; align-items: center; }
    .hero-stat { width: 100%; max-width: 260px; }
  }

  /* ── STATS SECTION ──────────────────────────────────────── */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .stats-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px 20px;
  }

  .stats-card-label {
    font-family: 'Syne', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  /* Streak */
  .streak-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .streak-fire {
    font-size: 28px;
    line-height: 1;
  }

  .streak-num {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 900;
    color: var(--terra-light);
    line-height: 1;
  }

  .streak-unit {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    line-height: 1.3;
  }

  .streak-dots {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .streak-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
  }

  .streak-dot.active { background: var(--terra); border-color: var(--terra); }
  .streak-dot.today  { background: var(--gold);  border-color: var(--gold); box-shadow: 0 0 6px rgba(201,168,76,0.5); }

  /* Weekly summary inside streak card */
  .week-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .week-stat-item {
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
    padding: 8px 10px;
  }

  .wsi-label {
    font-family: 'Syne', sans-serif;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 3px;
  }

  .wsi-val {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
    color: var(--cream-dim);
  }

  .wsi-val.good { color: var(--olive-light); }
  .wsi-val.great { color: var(--gold); }

  /* Head to head */
  .h2h-row {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .h2h-item {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .h2h-labels {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .h2h-name {
    font-family: 'Syne', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .h2h-name.fran { color: var(--terra-light); }
  .h2h-name.maria { color: var(--olive-light); }

  .h2h-val {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 800;
    color: var(--cream-dim);
  }

  .h2h-bar-wrap {
    height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 100px;
    overflow: hidden;
    position: relative;
  }

  .h2h-bar-fill {
    height: 100%;
    border-radius: 100px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    min-width: 4px;
  }

  .h2h-bar-fill.fran  { background: linear-gradient(90deg, var(--terra-dark), var(--terra-light)); }
  .h2h-bar-fill.maria { background: linear-gradient(90deg, var(--olive), var(--olive-light)); }

  .h2h-metric-label {
    font-family: 'Syne', sans-serif;
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
    margin-top: 10px;
  }

  .h2h-metric-label:first-of-type { margin-top: 0; }

  /* ── WEIGHT SECTION ─────────────────────────────────────── */
  .weight-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px 20px;
  }

  .weight-panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .weight-person-panel {
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    padding: 14px;
  }

  .weight-person-name {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .weight-person-name.fran { color: var(--terra-light); }
  .weight-person-name.maria { color: var(--olive-light); }

  .weight-current {
    display: flex;
    align-items: baseline;
    gap: 4px;
    margin-bottom: 10px;
  }

  .weight-current-num {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--cream);
    line-height: 1;
  }

  .weight-current-unit {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dim);
  }

  .weight-delta {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .weight-delta.loss { color: var(--olive-light); }
  .weight-delta.gain { color: var(--terra); }
  .weight-delta.same { color: var(--text-muted); }

  .weight-input-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .weight-input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--cream);
    outline: none;
    width: 100%;
    -moz-appearance: textfield;
  }

  .weight-input::-webkit-outer-spin-button,
  .weight-input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .weight-input:focus { border-color: rgba(255,255,255,0.15); }

  .weight-save-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--cream-dim);
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .weight-save-btn:hover { background: rgba(255,255,255,0.12); }
  .weight-save-btn.fran:hover { background: rgba(212,98,58,0.2); color: var(--terra-light); }
  .weight-save-btn.maria:hover { background: rgba(122,140,78,0.2); color: var(--olive-light); }

  /* Weight chart */
  .weight-chart-wrap {
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }

  .weight-chart-label {
    font-family: 'Syne', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .weight-chart-svg {
    width: 100%;
    height: 80px;
    overflow: visible;
  }

  .weight-chart-empty {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
    text-align: center;
    padding: 20px 0;
  }

  /* Mobile stats */
  @media (max-width: 700px) {
    .stats-grid { grid-template-columns: 1fr; }
    .weight-panels { grid-template-columns: 1fr; }
  }
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const SUPABASE_URL = 'https://dyzvblmwdmzrycwnktao.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5enZibG13ZG16cnljd25rdGFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNTI3ODYsImV4cCI6MjA4ODYyODc4Nn0.1QuB5x50DKcYrBNNOJRIQg-Mn9EbDhP9Zq9BnGf2wjg';

  // ── CONSTANTS ─────────────────────────────────────────────
  const TOTAL   = 75;
  const CIRC    = 2 * Math.PI * 56;
  const GLASSES = 8;

  // ── IN-MEMORY STATE ───────────────────────────────────────
  const state = {
    days: TOTAL, start: null,
    water_fran: 0, water_maria: 0,
    checks_fran: {}, checks_maria: {},
    weights_fran: [], weights_maria: []
  };

  // ── LOCAL STORAGE ─────────────────────────────────────────
  const _mem = {};
  const ls = {
    get(k)   { try { return localStorage.getItem(k); } catch { return _mem[k] ?? null; } },
    set(k,v) { try { localStorage.setItem(k, String(v)); } catch {} _mem[k] = String(v); },
    del(k)   { try { localStorage.removeItem(k); } catch {} delete _mem[k]; }
  };

  function lsSeed() {
    const d = parseInt(ls.get('75hard_days'));
    state.days  = (isNaN(d) || d < 0 || d > TOTAL) ? TOTAL : d;
    state.start = ls.get('75hard_start') || null;
    ['fran','maria'].forEach(p => {
      state[`water_${p}`]      = parseInt(ls.get(`75hard_water_${p}`)) || 0;
      state[`water_week_${p}`] = parseInt(ls.get(`75hard_water_week_${p}`)) || 0;
      try { state[`checks_${p}`] = JSON.parse(ls.get(`75hard_checks_${p}`)) || {}; }
      catch { state[`checks_${p}`] = {}; }
      try { state[`weights_${p}`] = JSON.parse(ls.get(`75hard_weights_${p}`)) || []; }
      catch { state[`weights_${p}`] = []; }
    });
  }

  // ── PERSIST (localStorage + Supabase) ────────────────────
  function persist(key, value) {
    const raw = typeof value === 'object' ? JSON.stringify(value) : String(value);
    ls.set(`75hard_${key}`, raw);
    dbWrite(key, value);
  }

  // ── SUPABASE ──────────────────────────────────────────────
  let sb = null;

  async function dbWrite(key, value) {
    if (!sb) return;
    await sb.from('challenge').upsert({ key, value: JSON.stringify(value) }, { onConflict: 'key' });
  }

  async function dbLoad() {
    if (!sb) return;
    const { data } = await sb.from('challenge').select('key,value');
    if (!data) return;
    data.forEach(row => {
      try {
        const v = JSON.parse(row.value);
        if (row.key === 'days')          state.days          = v;
        if (row.key === 'start')         state.start         = v;
        if (row.key === 'water_fran')    state.water_fran    = v;
        if (row.key === 'water_maria')   state.water_maria   = v;
        if (row.key === 'checks_fran')   state.checks_fran   = v;
        if (row.key === 'checks_maria')  state.checks_maria  = v;
        if (row.key === 'weights_fran')      state.weights_fran      = v;
        if (row.key === 'weights_maria')     state.weights_maria     = v;
        if (row.key === 'water_week_fran')   state.water_week_fran   = v;
        if (row.key === 'water_week_maria')  state.water_week_maria  = v;
      } catch {}
    });
  }

  function dbSubscribe() {
    if (!sb) return;
    sb.channel('challenge-sync')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'challenge' }, ({ new: row }) => {
        try {
          const v = JSON.parse(row.value);
          if (row.key === 'days')          { state.days          = v; renderCounter(v, true); }
          if (row.key === 'start')         { state.start         = v; renderCounterDates(); }
          if (row.key === 'water_fran')    { state.water_fran    = v; renderWater('fran'); renderStats(); }
          if (row.key === 'water_maria')   { state.water_maria   = v; renderWater('maria'); renderStats(); }
          if (row.key === 'checks_fran')   { state.checks_fran   = v; renderChecks('fran'); renderStats(); }
          if (row.key === 'checks_maria')  { state.checks_maria  = v; renderChecks('maria'); renderStats(); }
          if (row.key === 'weights_fran')      { state.weights_fran      = v; renderWeightPanel('fran');  renderWeightChart(); }
          if (row.key === 'weights_maria')     { state.weights_maria     = v; renderWeightPanel('maria'); renderWeightChart(); }
          if (row.key === 'water_week_fran')   { state.water_week_fran   = v; renderStats(); }
          if (row.key === 'water_week_maria')  { state.water_week_maria  = v; renderStats(); }
        } catch {}
      })
      .subscribe(s => setSyncStatus(s === 'SUBSCRIBED' ? 'synced' : 'connecting'));
  }

  async function initSupabase() {
    if (!SUPABASE_URL || !SUPABASE_KEY) { setSyncStatus('offline'); return; }
    try {
      sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      setSyncStatus('connecting');
      await dbLoad();
      renderCounter(state.days, false);
      renderWater('fran');  renderWater('maria');
      patchWaterForH2H('fran'); patchWaterForH2H('maria');
      renderChecks('fran'); renderChecks('maria');
      renderStats();
      renderWeightPanel('fran'); renderWeightPanel('maria');
      renderWeightChart();
      dbSubscribe();
    } catch(e) {
      console.warn('Supabase error:', e);
      setSyncStatus('offline');
    }
  }

  function setSyncStatus(status) {
    const el = document.getElementById('syncStatus');
    if (!el) return;
    const map = {
      synced:     { dot: '#7a8c4e', text: 'Synced' },
      connecting: { dot: '#c9a84c', text: 'Connecting...' },
      offline:    { dot: '#5a4e42', text: 'Offline' }
    };
    const s = map[status] || map.offline;
    el.innerHTML = `<span style="width:6px;height:6px;border-radius:50%;background:${s.dot};display:inline-block;margin-right:5px;flex-shrink:0;"></span>${s.text}`;
  }

  // ── HELPERS ───────────────────────────────────────────────
  function fmtDate(s) {
    return new Date(s).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
  }
  function addDays(s, n) {
    const d = new Date(s); d.setDate(d.getDate() + n);
    return d.toISOString().split('T')[0];
  }
  function today() { return new Date().toISOString().split('T')[0]; }

  // ── COUNTER ───────────────────────────────────────────────
  function renderCounter(n, animate) {
    const completed = TOTAL - n;
    const progress  = completed / TOTAL;
    document.getElementById('counterArc').style.strokeDashoffset = CIRC * (1 - progress);
    document.getElementById('counterNum').textContent = n;
    document.getElementById('progressFill').style.width = Math.round(progress * 100) + '%';
    document.getElementById('progressPct').textContent  = Math.round(progress * 100) + '%';

    if (animate) {
      const el = document.getElementById('counterNum');
      el.classList.add('pop');
      setTimeout(() => el.classList.remove('pop'), 250);
    }

    const btn    = document.getElementById('counterBtn');
    const hint   = document.getElementById('counterHint');
    const status = document.getElementById('counterStatus');
    const reset  = document.getElementById('counterReset');

    if (n === TOTAL) {
      btn.classList.remove('done'); hint.textContent = 'Tap to log day 1';
      status.textContent = 'Ready to start your challenge?';
    } else if (n === 0) {
      btn.classList.add('done'); hint.textContent = 'Challenge complete!';
      status.textContent = '🏆 75 Hard Complete. Legends.';
    } else if (n <= 5) {
      btn.classList.remove('done'); hint.textContent = 'So close — tap to log';
      status.textContent = `${n} day${n===1?'':'s'} left. Don't stop now.`;
    } else if (n <= 25) {
      btn.classList.remove('done'); hint.textContent = 'Tap to log a day';
      status.textContent = `${completed} days down. Almost there.`;
    } else {
      btn.classList.remove('done'); hint.textContent = 'Tap to log a day';
      status.textContent = `${completed} day${completed===1?'':'s'} done. Keep going.`;
    }

    renderCounterDates();
    reset.classList.toggle('visible', n < TOTAL);
  }

  function renderCounterDates() {
    const startEl = document.getElementById('startDateEl');
    const endEl   = document.getElementById('endDateEl');
    if (state.start) {
      startEl.textContent = fmtDate(state.start); startEl.classList.remove('not-started');
      endEl.textContent   = fmtDate(addDays(state.start, 75)); endEl.classList.remove('not-started');
    } else {
      startEl.textContent = 'Not started'; startEl.classList.add('not-started');
      endEl.textContent   = '—';           endEl.classList.add('not-started');
    }
  }

  function tickCounter() {
    let n = state.days;
    if (n <= 0) return;
    if (n === TOTAL && !state.start) {
      state.start = today();
      persist('start', state.start);
    }
    n--;
    state.days = n;
    persist('days', n);
    clearDayData('fran');
    clearDayData('maria');
    renderCounter(n, true);
    renderChecks('fran'); renderChecks('maria');
    renderWater('fran');  renderWater('maria');
  }

  function resetCounter() {
    state.days = TOTAL; state.start = null;
    state.water_fran = 0; state.water_maria = 0;
    state.checks_fran = {}; state.checks_maria = {};
    ['days','start','water_fran','water_maria','checks_fran','checks_maria']
      .forEach(k => { ls.del(`75hard_${k}`); dbWrite(k, k === 'days' ? TOTAL : null); });
    renderCounter(TOTAL, false);
    renderWater('fran'); renderWater('maria');
    renderChecks('fran'); renderChecks('maria');
  }

  // ── WATER ─────────────────────────────────────────────────
  function buildWater(person) {
    const wrap = document.getElementById(`waterGlasses-${person}`);
    wrap.innerHTML = '';
    for (let i = 0; i < GLASSES; i++) {
      const g = document.createElement('div');
      g.className = 'water-glass';
      g.innerHTML = `<svg viewBox="0 0 28 34" fill="none">
        <path class="water-glass-body" d="M4 4 L6 30 Q6 32 14 32 Q22 32 22 30 L24 4 Z"/>
        <path class="water-glass-outline" d="M4 4 L6 30 Q6 32 14 32 Q22 32 22 30 L24 4 Z"/>
        <line x1="4" y1="4" x2="24" y2="4" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
      </svg>`;
      g.addEventListener('click', () => {
        let n = state[`water_${person}`];
        n = i < n ? i : i + 1;
        n = Math.min(n, GLASSES);
        state[`water_${person}`] = n;
        persist(`water_${person}`, n);
        renderWater(person);
      });
      wrap.appendChild(g);
    }
  }

  function renderWater(person) {
    const n = state[`water_${person}`];
    document.querySelectorAll(`#waterGlasses-${person} .water-glass`)
      .forEach((g,i) => g.classList.toggle('filled', i < n));
    const lbl = document.getElementById(`waterLabel-${person}`);
    lbl.textContent = `${n} / ${GLASSES} glasses (~${(n*0.33).toFixed(1)}L)`;
    lbl.classList.toggle('full', n >= GLASSES);
  }

  // ── CHECKLIST ─────────────────────────────────────────────
  function clearDayData(p) {
    const checks = state[`checks_${p}`] || {};
    delete checks[today()];
    state[`water_${p}`] = 0;
    persist(`water_${p}`, 0);
    persist(`checks_${p}`, checks);
  }

  function renderChecks(person) {
    const dayChecks = (state[`checks_${person}`] || {})[today()] || {};
    document.querySelectorAll(`#checks-${person} .daily-check-item`).forEach(item => {
      item.classList.toggle('checked', !!dayChecks[item.dataset.key]);
    });
  }

  function toggleCheck(item, person) {
    const checks = state[`checks_${person}`] || {};
    const d = today();
    if (!checks[d]) checks[d] = {};
    checks[d][item.dataset.key] = !checks[d][item.dataset.key];
    state[`checks_${person}`] = checks;
    persist(`checks_${person}`, checks);
    renderChecks(person);
    renderStats();
  }

  // ── STATS, STREAK, H2H ────────────────────────────────────
  function getWeekDates() {
    const now = new Date();
    const day = now.getDay(); // 0=Sun
    const mon = new Date(now); mon.setDate(now.getDate() - ((day + 6) % 7));
    return Array.from({ length: 7 }, (_, i) => {
      const d = new Date(mon); d.setDate(mon.getDate() + i);
      return d.toISOString().split('T')[0];
    });
  }

  function isPerfectDay(person, date) {
    const d = (state[`checks_${person}`] || {})[date] || {};
    return d.workout && d.diet && d.fast && d.water;
  }

  function computeStreak() {
    let streak = 0;
    const d = new Date(); d.setDate(d.getDate() - 1); // start from yesterday
    for (let i = 0; i < 75; i++) {
      const dateStr = d.toISOString().split('T')[0];
      if (isPerfectDay('fran', dateStr) && isPerfectDay('maria', dateStr)) {
        streak++;
        d.setDate(d.getDate() - 1);
      } else break;
    }
    // also count today if both are already perfect
    if (isPerfectDay('fran', today()) && isPerfectDay('maria', today())) streak++;
    return streak;
  }

  function renderStats() {
    const week = getWeekDates();
    const checks_f = state.checks_fran  || {};
    const checks_m = state.checks_maria || {};

    // Streak
    const streak = computeStreak();
    const streakEl = document.getElementById('streakNum');
    if (streakEl) streakEl.textContent = streak;

    // Streak dots (last 7 days)
    const dotsEl = document.getElementById('streakDots');
    if (dotsEl) {
      dotsEl.innerHTML = '';
      week.forEach(date => {
        const dot = document.createElement('div');
        const bothPerfect = isPerfectDay('fran', date) && isPerfectDay('maria', date);
        const isToday = date === today();
        dot.className = 'streak-dot' + (bothPerfect ? (isToday ? ' today' : ' active') : '');
        dotsEl.appendChild(dot);
      });
    }

    // Weekly summary
    let daysLogged = 0, perfectDays = 0;
    let totalWaterF = 0, totalWaterM = 0, waterDays = 0;
    week.forEach(date => {
      const fChecks = checks_f[date] || {};
      const mChecks = checks_m[date] || {};
      const anyActivity = Object.values(fChecks).some(Boolean) || Object.values(mChecks).some(Boolean);
      if (anyActivity) daysLogged++;
      if (isPerfectDay('fran', date) && isPerfectDay('maria', date)) perfectDays++;
    });

    // Water average — computed from stored daily water (we approximate from glasses logged in checks)
    // We read the weekly water data from checks' water key if present
    week.forEach(date => {
      const fw = (checks_f[date] || {})._water || 0;
      const mw = (checks_m[date] || {})._water || 0;
      if (fw || mw) waterDays++;
      totalWaterF += fw;
      totalWaterM += mw;
    });

    const setEl = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
    setEl('weekDays',    `${daysLogged} / 7`);
    setEl('weekPerfect', perfectDays);

    const perfectEl = document.getElementById('weekPerfect');
    if (perfectEl) {
      perfectEl.className = 'wsi-val' + (perfectDays >= 5 ? ' great' : perfectDays >= 3 ? ' good' : '');
    }

    // H2H — checklist items this week
    let checksFran = 0, checksMaria = 0;
    week.forEach(date => {
      const fd = checks_f[date] || {}; const md = checks_m[date] || {};
      checksFran  += Object.values(fd).filter(Boolean).length;
      checksMaria += Object.values(md).filter(Boolean).length;
    });
    const maxChecks = Math.max(checksFran, checksMaria, 1);
    setEl('h2hChecksFran',  checksFran);
    setEl('h2hChecksMaria', checksMaria);
    const bCF = document.getElementById('h2hBarChecksFran');
    const bCM = document.getElementById('h2hBarChecksMaria');
    if (bCF) bCF.style.width = Math.round((checksFran  / maxChecks) * 100) + '%';
    if (bCM) bCM.style.width = Math.round((checksMaria / maxChecks) * 100) + '%';

    // H2H — water this week (from stored water_fran/maria — those are today's; we need cumulative)
    // We store a weekly water tally in challenge table as water_week_fran/maria
    const wf = state.water_week_fran  || 0;
    const wm = state.water_week_maria || 0;
    const maxW = Math.max(wf, wm, 1);
    setEl('h2hWaterFran', wf);
    const wml = document.getElementById('h2hBarWaterMariaLabel');
    if (wml) wml.textContent = wm;
    const bWF = document.getElementById('h2hBarWaterFran');
    const bWM = document.getElementById('h2hBarWaterMaria');
    if (bWF) bWF.style.width = Math.round((wf / maxW) * 100) + '%';
    if (bWM) bWM.style.width = Math.round((wm / maxW) * 100) + '%';
  }

  // ── WEIGHT TRACKING ───────────────────────────────────────
  function saveWeight(person) {
    const input = document.getElementById(`weightInput${person.charAt(0).toUpperCase() + person.slice(1)}`);
    const val = parseFloat(input.value);
    if (isNaN(val) || val < 30 || val > 250) return;
    const entry = { date: today(), weight: val };
    const arr = state[`weights_${person}`] || [];
    const idx = arr.findIndex(e => e.date === today());
    if (idx >= 0) arr[idx] = entry; else arr.push(entry);
    arr.sort((a, b) => a.date.localeCompare(b.date));
    state[`weights_${person}`] = arr;
    persist(`weights_${person}`, arr);
    input.value = '';
    renderWeightPanel(person);
    renderWeightChart();
  }

  function renderWeightPanel(person) {
    const arr  = state[`weights_${person}`] || [];
    const numEl = document.getElementById(`weightCurr${person.charAt(0).toUpperCase() + person.slice(1)}`);
    const dltEl = document.getElementById(`weightDelta${person.charAt(0).toUpperCase() + person.slice(1)}`);
    if (!numEl) return;
    if (arr.length === 0) { numEl.textContent = '–'; if (dltEl) dltEl.textContent = ''; return; }
    const latest = arr[arr.length - 1].weight;
    numEl.textContent = latest.toFixed(1);
    if (arr.length >= 2 && dltEl) {
      const first = arr[0].weight;
      const diff  = latest - first;
      const sign  = diff < 0 ? '' : '+';
      dltEl.textContent = `${sign}${diff.toFixed(1)} kg since start`;
      dltEl.className   = 'weight-delta ' + (diff < 0 ? 'loss' : diff > 0 ? 'gain' : 'same');
    } else if (dltEl) {
      dltEl.textContent = 'First entry logged';
      dltEl.className   = 'weight-delta same';
    }
  }

  function renderWeightChart() {
    const container = document.getElementById('weightChartContainer');
    if (!container) return;
    const wf = state.weights_fran  || [];
    const wm = state.weights_maria || [];
    if (wf.length === 0 && wm.length === 0) {
      container.innerHTML = '<div class="weight-chart-empty">Log your first weight entry to see progress</div>';
      return;
    }
    // Merge all dates
    const allDates = [...new Set([...wf.map(e=>e.date), ...wm.map(e=>e.date)])].sort();
    if (allDates.length < 1) return;
    const wfMap = Object.fromEntries(wf.map(e => [e.date, e.weight]));
    const wmMap = Object.fromEntries(wm.map(e => [e.date, e.weight]));
    const allVals = [...wf.map(e=>e.weight), ...wm.map(e=>e.weight)];
    const minW = Math.min(...allVals) - 1;
    const maxW = Math.max(...allVals) + 1;
    const W = 600, H = 80, pad = 10;
    const xScale = i => pad + (i / Math.max(allDates.length - 1, 1)) * (W - pad * 2);
    const yScale = v => H - pad - ((v - minW) / (maxW - minW)) * (H - pad * 2);
    const makePath = (map, dates) => {
      const pts = dates.map((d, i) => map[d] != null ? `${xScale(i)},${yScale(map[d])}` : null).filter(Boolean);
      return pts.length < 2 ? '' : 'M' + pts.join(' L');
    };
    const makeDots = (map, dates, color) => dates.map((d, i) =>
      map[d] != null ? `<circle cx="${xScale(i)}" cy="${yScale(map[d])}" r="3" fill="${color}" opacity="0.9"/>` : ''
    ).join('');
    const pathF = makePath(wfMap, allDates);
    const pathM = makePath(wmMap, allDates);
    const dotsF = makeDots(wfMap, allDates, '#e07a55');
    const dotsM = makeDots(wmMap, allDates, '#9aae62');
    // Y axis labels
    const yLabels = [minW + 1, (minW + maxW) / 2, maxW - 1].map(v =>
      `<text x="0" y="${yScale(v) + 4}" font-size="8" fill="rgba(255,255,255,0.25)" font-family="sans-serif">${v.toFixed(0)}</text>`
    ).join('');
    container.innerHTML = `
      <div style="display:flex;gap:12px;margin-bottom:8px;flex-wrap:wrap;">
        <span style="font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--terra-light);">■ Francisco</span>
        <span style="font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--olive-light);">■ Maria</span>
      </div>
      <svg class="weight-chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
        ${yLabels}
        ${pathF ? `<path d="${pathF}" fill="none" stroke="var(--terra)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.7"/>` : ''}
        ${pathM ? `<path d="${pathM}" fill="none" stroke="var(--olive)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.7"/>` : ''}
        ${dotsF}${dotsM}
      </svg>`;
  }

  // Also update water tracking to accumulate weekly totals for H2H
  const _origBuildWater = buildWater;
  // Patch water glass click to also update weekly water tally
  function patchWaterForH2H(person) {
    const wrap = document.getElementById(`waterGlasses-${person}`);
    if (!wrap) return;
    wrap.querySelectorAll('.water-glass').forEach((g, i) => {
      g.onclick = () => {
        let n = state[`water_${person}`];
        n = i < n ? i : i + 1;
        n = Math.min(n, GLASSES);
        const prev = state[`water_${person}`];
        state[`water_${person}`] = n;
        persist(`water_${person}`, n);
        // Update weekly water tally
        const key = `water_week_${person}`;
        state[key] = (state[key] || 0) + (n - prev);
        persist(key, state[key]);
        renderWater(person);
        renderStats();
      };
    });
  }

  // ── BOOT ──────────────────────────────────────────────────
  lsSeed();
  renderCounter(state.days, false);
  buildWater('fran');  renderWater('fran');
  buildWater('maria'); renderWater('maria');
  patchWaterForH2H('fran');
  patchWaterForH2H('maria');
  renderChecks('fran'); renderChecks('maria');
  renderStats();
  renderWeightPanel('fran'); renderWeightPanel('maria');
  renderWeightChart();
  initSupabase();

  // DAY TABS
  function showDay(day, btn) {
    document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('day-' + day).classList.add('active');
    btn.classList.add('active');
  }

  // MEAL EXPAND
  function toggleMeal(card) {
    const isExpanded = card.classList.contains('expanded');
    // Close all others in same panel
    const panel = card.closest('.day-panel');
    panel.querySelectorAll('.meal-card.expanded').forEach(c => c.classList.remove('expanded'));
    if (!isExpanded) card.classList.add('expanded');
  }

  // PHASE TOGGLE
  function showPhase(phase, btn) {
    document.querySelectorAll('.phase-content').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('phase-' + phase).classList.add('active');
    btn.classList.add('active');
  }

  // SHOPPING TOGGLE
  function toggleShop(item) {
    item.classList.toggle('checked');
  }

  // SCROLL REVEAL
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
</body>
</html>
